<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. King API - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0b0c16;
            overflow-x: hidden;
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }
        .btn-glow {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.7);
            transform: scale(1.03);
        }
        .btn-outline {
            border: 2px solid #ec4899;
            background-color: rgba(11, 12, 22, 0.7);
            box-shadow: inset 0 0 10px rgba(236, 72, 153, 0.2);
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background-color: rgba(236, 72, 153, 0.1);
            transform: scale(1.03);
        }
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .content-container {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between">
    
    <canvas id="particles-canvas"></canvas>

    <header class="content-container w-full p-5 flex justify-between items-center border-b border-purple-900/30">
        <h1 class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 text-glow">Mr. King API</h1>
        <button class="text-white text-2xl focus:outline-none">&#9776;</button>
    </header>

    <main class="content-container flex flex-col items-center justify-center text-center px-6 flex-grow py-10">
        <div class="w-36 h-36 rounded-full border-4 border-pink-500 flex items-center justify-center text-gray-400 font-semibold mb-8 bg-gray-900/50 relative overflow-hidden shadow-[0_0_25px_rgba(236,72,153,0.3)]">
            <span class="text-lg font-bold text-pink-400 tracking-wider">KING</span>
        </div>

        <h2 class="text-4xl md:text-5xl font-bold tracking-wide mb-8">
            Welcome to <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 text-glow">Mr. King API Server</span>
        </h2>

        <div class="flex flex-col gap-4 w-full max-w-xs">
            <a href="/login" class="btn-glow py-3 px-6 rounded-full font-semibold text-center cursor-pointer">View Dashboard</a>
            <a href="#" class="btn-outline py-3 px-6 rounded-full font-semibold text-center text-pink-400 cursor-pointer">Contact Me</a>
        </div>

        <div class="flex items-center justify-center gap-6 mt-16">
            <a href="#" class="w-12 h-12 rounded-full border border-gray-700 bg-gray-900/60 flex items-center justify-center hover:border-pink-500 hover:text-pink-400 transition-all text-xs text-gray-400">GitHub</a>
            <a href="#" class="w-12 h-12 rounded-full border border-gray-700 bg-gray-900/60 flex items-center justify-center hover:border-pink-500 hover:text-pink-400 transition-all text-xs text-gray-400">Telegram</a>
            <a href="#" class="w-12 h-12 rounded-full border border-gray-700 bg-gray-900/60 flex items-center justify-center hover:border-pink-500 hover:text-pink-400 transition-all text-xs text-gray-400">Facebook</a>
            <a href="#" class="w-12 h-12 rounded-full border border-gray-700 bg-gray-900/60 flex items-center justify-center hover:border-pink-500 hover:text-pink-400 transition-all text-xs text-gray-400">Bot</a>
        </div>
    </main>

    <footer class="content-container text-center py-4 text-xs text-gray-500 border-t border-purple-900/10">
        &copy; 2026 All rights reserved <span class="text-purple-400">Mr. King</span>
    </footer>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ec4899';
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 110) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(236, 72, 153, ${1 - dist / 110 * 0.15})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
