<!DOCTYPE html>
<html>
<head>
    <title>API Manager</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="formTitle">Add New API</h2>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="API Name">
        <input type="text" id="url" placeholder="API URL">
        <button onclick="saveApi()">Save Changes</button>
        <div id="list"></div>
    </div>

    <script>
        async function load() {
            const res = await fetch('/api/all');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(a => 
                `<div class="item">${a.name} <button onclick="edit('${a._id}','${a.name}','${a.url}')">Edit</button> <button onclick="del('${a._id}')">Del</button></div>`
            ).join('');
        }
        async function saveApi() {
            const id = document.getElementById('editId').value;
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, name: document.getElementById('name').value, url: document.getElementById('url').value})
            });
            load();
        }
        function edit(id, name, url) {
            document.getElementById('editId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('url').value = url;
            document.getElementById('formTitle').innerText = "Edit API";
        }
        async function del(id) { await fetch('/api/delete/'+id, {method: 'DELETE'}); load(); }
        load();
    </script>
</body>
</html>
