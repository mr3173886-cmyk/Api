<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. King API - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0b0c16; }
    </style>
</head>
<body class="text-white min-h-screen p-6">
    <script>
        if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = '/login';
    </script>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Mr. King Control Panel</h1>
            <button onclick="localStorage.clear(); window.location.href='/login';" class="bg-red-600/80 hover:bg-red-600 px-4 py-1.5 rounded-lg text-sm transition-all cursor-pointer">Logout</button>
        </div>

        <div class="bg-[#11121c] border border-gray-800 p-6 rounded-2xl mb-8 shadow-xl">
            <h2 class="text-lg font-semibold mb-4 text-pink-400" id="formTitle">Add New API Entry</h2>
            <form id="apiForm" class="space-y-4">
                <input type="hidden" id="apiId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-gray-400">Endpoint / Content Name (e.g. duck)</label>
                        <input type="text" id="apiName" placeholder="duck" required class="w-full bg-[#1b1c2b] border border-gray-700 rounded-xl py-2.5 px-4 text-white text-sm focus:outline-none focus:border-pink-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-gray-400">Media URL (Image Link)</label>
                        <input type="url" id="apiUrl" placeholder="https://..." required class="w-full bg-[#1b1c2b] border border-gray-700 rounded-xl py-2.5 px-4 text-white text-sm focus:outline-none focus:border-pink-500">
                    </div>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="resetForm()" class="bg-gray-700 px-4 py-2 rounded-xl text-sm hidden" id="cancelBtn">Cancel</button>
                    <button type="submit" class="bg-gradient-to-r from-purple-500 to-pink-500 font-semibold px-6 py-2 rounded-xl text-sm hover:opacity-90 transition-all cursor-pointer">Save API Route</button>
                </div>
            </form>
        </div>

        <div class="bg-[#11121c] border border-gray-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="p-4 border-b border-gray-800 bg-purple-950/10">
                <h3 class="font-semibold text-gray-300 text-sm">Registered Endpoints & Assets</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-purple-950/20 text-gray-400 border-b border-gray-800 text-xs">
                            <th class="p-4">Route Path</th>
                            <th class="p-4">Target Redirect Asset URL</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="apiTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('apiForm');
        const apiIdInput = document.getElementById('apiId');
        const apiNameInput = document.getElementById('apiName');
        const apiUrlInput = document.getElementById('apiUrl');
        const formTitle = document.getElementById('formTitle');
        const cancelBtn = document.getElementById('cancelBtn');

        async function fetchApis() {
            const res = await fetch('/api/all');
            const data = await res.json();
            const tbody = document.getElementById('apiTableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-800/40 hover:bg-gray-900/20 transition-all">
                        <td class="p-4 font-semibold text-purple-400">/api/${item.name}</td>
                        <td class="p-4 text-gray-400 truncate max-w-xs"><a href="${item.url}" target="_blank" class="hover:underline text-blue-400 text-xs">${item.url}</a></td>
                        <td class="p-4 text-right space-x-2">
                            <button onclick="editItem('${item._id}', '${item.name}', '${item.url}')" class="text-xs bg-yellow-600/20 text-yellow-400 px-2.5 py-1 rounded hover:bg-yellow-600/40 transition-all cursor-pointer">Edit</button>
                            <button onclick="deleteItem('${item._id}')" class="text-xs bg-red-600/20 text-red-400 px-2.5 py-1 rounded hover:bg-red-600/40 transition-all cursor-pointer">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: apiIdInput.value || undefined,
                    name: apiNameInput.value,
                    url: apiUrlInput.value
                })
            });
            resetForm();
            fetchApis();
        });

        function editItem(id, name, url) {
            apiIdInput.value = id;
            apiNameInput.value = name;
            apiUrlInput.value = url;
            formTitle.innerText = "Edit API Entry";
            cancelBtn.classList.remove('hidden');
        }

        function resetForm() {
            apiIdInput.value = '';
            form.reset();
            formTitle.innerText = "Add New API Entry";
            cancelBtn.classList.add('hidden');
        }

        async function deleteItem(id) {
            if(confirm('Are you sure you want to delete this route?')) {
                await fetch(`/api/delete/${id}`, { method: 'DELETE' });
                fetchApis();
            }
        }
        fetchApis();
    </script>
</body>
</html>
