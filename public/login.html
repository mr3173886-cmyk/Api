<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. King API - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050508; }
        .text-glow { text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        .btn-glow { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-sm bg-[#11121c] border border-gray-800/60 p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold text-center tracking-wide mb-2 text-glow text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            Mr. King Dashboard
        </h2>
        <p class="text-gray-400 text-sm text-center mb-8">Access your interactive API Explorer</p>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">Username</label>
                <div class="relative">
                    <span class="absolute left-3 top-3.5 text-purple-400 text-sm">👤</span>
                    <input type="text" id="username" placeholder="Enter username" required
                        class="w-full bg-[#1b1c2b] border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 transition-all text-sm">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-3.5 text-purple-400 text-sm">🔒</span>
                    <input type="password" id="password" placeholder="Enter password" required
                        class="w-full bg-[#1b1c2b] border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 transition-all text-sm">
                </div>
            </div>

            <p id="errorMsg" class="text-red-500 text-xs hidden text-center font-medium"></p>

            <button type="submit" class="w-full btn-glow text-white font-semibold py-3 rounded-xl shadow-lg shadow-pink-500/20 hover:opacity-90 active:scale-95 transition-all cursor-pointer">
                Log In
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-8">
            &copy; 2026 All rights reserved <span class="text-purple-400">Mr. King</span>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if(data.success) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = '/dashboard';
            } else {
                errorMsg.innerText = data.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
